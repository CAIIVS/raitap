# @package hydra.launcher
defaults:
  - submitit_slurm

# These defaults target single-GPU jobs and allow up to 8 concurrent Hydra tasks
# without oversubscribing the node memory budget.
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 240
cpus_per_task: 8
gpus_per_node: 1
tasks_per_node: 1
mem_gb: 48
nodes: 1
name: ${hydra.job.name}
partition: null
account: null
qos: null
constraint: null
exclude: null
gres: null
cpus_per_gpu: null
gpus_per_task: null
mem_per_gpu: null
mem_per_cpu: null
comment: null
signal_delay_s: 120
max_num_timeout: 0
additional_parameters: {}
array_parallelism: 8

