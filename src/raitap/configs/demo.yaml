# Self-contained demo config invoked via `raitap --demo`.
# Inlines every value so it works without external group YAMLs.
defaults:
  - raitap_schema     # binds AppConfig dataclass → unset fields inherit defaults
  - metrics: multiclass_classification   # narrows metrics schema so num_classes is accepted
  - data/labels: tabular
  - _self_

hardware: cpu
experiment_name: demo

model:
  source: vit_b_32   # built-in torchvision name; loads with default ImageNet weights

data:
  name: imagenet_samples
  source: imagenet_samples
  forward_batch_size: 4
  preprocessing: model-bundled                # data side: Resize + CenterCrop, per-image in loader
  model_input_transformation: model-bundled   # model side: Normalize, at the forward pass
  labels:
    source: imagenet_samples    # resolves to the bundled labels.csv for this sample
    id_column: image
    column: label

metrics:
  num_classes: 1000

transparency:
  my_integrated_gradients_explainer:
    use: captum
    algorithm: IntegratedGradients
    call:
      target: 0
      internal_batch_size: 8   # chunk IG steps so CPU peak RAM stays bounded
    visualisers:
      - use: captum_image

robustness:
  my_pgd_attacker:
    use: torchattacks
    algorithm: PGD
    constructor:
      eps: 0.03
      alpha: 0.005
      steps: 10
    visualisers:
      - use: image_pair

reporting:
  use: html
  filename: demo_report
