defaults:
  - raitap_schema      # required to bind the schema, must come first
  - reporting: html
  - metrics: multiclass_classification
  - data/labels: tabular
  - _self_

hardware: gpu
experiment_name: example

model:
  source: vit_b_32   # built-in torchvision name; loads with default ImageNet weights

data:
  name: imagenet_samples
  source: imagenet_samples
  forward_batch_size: 4
  labels:
    source: imagenet_samples    # bundled labels.csv for this sample
    id_column: image
    column: label

metrics:
  num_classes: 1000

transparency:
  default:
    use: captum
    algorithm: IntegratedGradients
    call:
      target: 0
    visualisers:
      - use: captum_image

robustness:
  pgd:
    use: torchattacks
    algorithm: PGD
    constructor:
      eps: 0.03
      alpha: 0.005
      steps: 10
    visualisers:
      - use: image_pair
