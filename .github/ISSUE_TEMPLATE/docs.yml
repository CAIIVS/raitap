name: Docs issue
description: Broken link, wrong content, YAML/Python tab mismatch, missing or outdated section.
title: "Docs: ..."
labels: ["docs"]
type: Task
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Broken link / 404
        - Wrong / outdated content
        - YAML and Python tab disagree (`config-tabs`)
        - Framework / library table out of date
        - Missing section
        - Typo / wording
        - Build / Sphinx error
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module(s)
      description: Which module(s) does this docs page concern? Skip / pick `unsure` if cross-cutting.
      multiple: true
      options:
        - transparency
        - robustness
        - metrics
        - reporting
        - tracking
        - data
        - model
        - pipeline
        - configs
        - deps
        - task-family
        - unsure
    validations:
      required: false

  - type: input
    id: page
    attributes:
      label: Page
      description: Docs URL or path to file
      placeholder: "https://caiivs.github.io/raitap/ or docs/modules/transparency/visualisers.md"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
      description: Quote the offending text, or describe what is missing.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested text/fix
      description: Optional, but speeds things up.
    validations:
      required: false
