name: New library / adapter
description: Propose wrapping a new third-party library as an adapter in an existing module.
title: "feat(<module>): add <library> adapter"
labels: ["enhancement", "adapter"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for adding a **new adapter** (explainer, assessor, metric, reporter, tracker) that wraps an existing third-party library inside one of raitap's current modules.

        New module entirely? Use the **New module** template instead.
        New visualiser for an existing adapter? Use the **New visualiser** template.

        Read [Adding an adapter](https://caiivs.github.io/raitap/contributor/adding-an-adapter.html) before filing.

  - type: dropdown
    id: module
    attributes:
      label: Target module
      description: Which raitap module will host the adapter?
      options:
        - transparency
        - robustness
        - metrics
        - reporting
        - tracking
        - data
        - model
    validations:
      required: true

  - type: dropdown
    id: family
    attributes:
      label: Adapter family / abstract base
      description: Pick the abstract base your adapter will inherit from.
      options:
        - "transparency: AttributionOnlyExplainer"
        - "transparency: FullExplainer"
        - "robustness: EmpiricalAttackAssessor"
        - "robustness: FormalVerificationAssessor"
        - "metrics: BaseMetricComputer"
        - "reporting: BaseReporter"
        - "tracking: BaseTracker"
        - other / unsure
    validations:
      required: true

  - type: input
    id: library-name
    attributes:
      label: Library name
      description: The pip package name that the adapter will wrap.
      placeholder: "e.g. shap, captum, torchattacks, mlflow"
    validations:
      required: true

  - type: input
    id: library-docs
    attributes:
      label: Library documentation URL
      placeholder: "https://..."
    validations:
      required: true

  - type: input
    id: library-repo
    attributes:
      label: Library source repository
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: License
      description: SPDX identifier (MIT, Apache-2.0, BSD-3-Clause, GPL-3.0, …). Copyleft licenses need maintainer review.
      placeholder: "MIT"
    validations:
      required: true

  - type: input
    id: registry-name
    attributes:
      label: Proposed registry_name
      description: The CLI / Python handle (`+transparency=<name>` / `from raitap.transparency import <name>`).
      placeholder: "e.g. superxai"
    validations:
      required: true

  - type: input
    id: extra
    attributes:
      label: Proposed uv / pip extra
      description: The name to use in `pyproject.toml` `[project.optional-dependencies]`.
      placeholder: "e.g. superxai"
    validations:
      required: true

  - type: textarea
    id: algorithms
    attributes:
      label: Algorithms / methods covered
      description: List the algorithms the adapter will expose via `algorithm_registry` and the `MethodFamily` each one belongs to.
      placeholder: |
        - SuperTreeShap → MethodFamily.SHAPLEY
        - SuperKernel    → MethodFamily.PERTURBATION
    validations:
      required: true

  - type: textarea
    id: why-not-existing
    attributes:
      label: Why isn't this covered by an existing adapter?
      description: |
        Compare against current adapters in the same family. Be specific:
        - Different algorithm class (e.g. SHAPLEY vs GRADIENT)?
        - Different backend (tabular vs vision, PyTorch vs sklearn)?
        - Better maintained / faster / stricter guarantees?
        Drive-by duplicates of existing wrappers will be closed.
    validations:
      required: true

  - type: textarea
    id: backend-compat
    attributes:
      label: Backend compatibility
      description: Which `BackendKind` (TorchClassifier, SklearnClassifier, …) will `check_backend_compat` accept?
    validations:
      required: true

  - type: textarea
    id: error-patterns
    attributes:
      label: Known footguns / error patterns
      description: Confusing library errors worth rewriting via `error_patterns={re.compile(...): "..."}`. Optional but encouraged.
      placeholder: |
        - "shape mismatch on dim 0" → "Pass a single sample, not a batch."
    validations:
      required: false

  - type: textarea
    id: visualisers
    attributes:
      label: Visualisers
      description: Which existing visualisers will pair with this adapter? New visualiser needed? File a separate **New visualiser** issue and link it here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Contributor checklist
      description: All four steps are mandatory per `docs/contributor/adding-an-adapter.md`.
      options:
        - label: Adapter class under `src/raitap/<module>/<subdir>/`, declaring `registry_name`, `extra`, `library` via class kwargs.
        - label: "`pyproject.toml` `[project.optional-dependencies]` entry, plus umbrella extra if applicable."
        - label: Tests covering registry membership, `check_backend_compat`, `__init_subclass__` wiring, and one happy-path compute.
        - label: Docs row in `docs/modules/<module>/frameworks-and-libraries.md` with YAML + Python tabs.
