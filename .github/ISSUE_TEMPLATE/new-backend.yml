name: New model backend
description: Wire a new model framework into raitap (e.g. JAX, TensorFlow, ONNX-runtime variant) as a `ModelBackend` subclass.
title: "feat(model): add <backend> backend"
labels: ["enhancement", "model", "backend"]
body:
  - type: markdown
    attributes:
      value: |
        Model backends live in `src/raitap/models/backend.py`. Each subclass of `ModelBackend` (e.g. `TorchBackend`,
        `OnnxBackend`) lets every adapter family decide compatibility via `check_backend_compat`.

        Adding a backend cross-cuts every existing adapter — expect heavy review. This issue is the RFC.

  - type: input
    id: backend-name
    attributes:
      label: Backend name
      description: Class name (TitleCase ending in `Backend`).
      placeholder: "e.g. JaxBackend, TensorFlowBackend, OnnxRuntimeWebBackend"
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Underlying framework
      placeholder: "e.g. JAX 0.4, TensorFlow 2.16, ONNX-Runtime 1.20"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is the existing set (`TorchBackend`, `OnnxBackend`) insufficient? Which adapters / users does this unblock?
    validations:
      required: true

  - type: textarea
    id: capabilities
    attributes:
      label: Capability matrix vs existing adapters
      description: |
        For each adapter family, can this backend participate? Mark Y / N / partial and why.
        This drives the `check_backend_compat` implementations across the codebase.
      placeholder: |
        | Adapter family | Y / N | Notes |
        |---|---|---|
        | Transparency: Captum | … | gradient access? |
        | Transparency: SHAP | … | |
        | Robustness: Torchattacks | … | needs autograd |
        | Robustness: Foolbox | … | |
        | Robustness: Marabou | … | network export format |
        | Metrics | … | |
    validations:
      required: true

  - type: textarea
    id: contract
    attributes:
      label: ModelBackend contract
      description: Sketch which `ModelBackend` abstract methods you'll implement and how (forward, autograd, batched inference, ONNX export, etc.).
    validations:
      required: true

  - type: textarea
    id: dependency
    attributes:
      label: New dependencies
      description: Pip package(s), extras name, version constraints, platform / GPU / accelerator notes.
    validations:
      required: true

  - type: textarea
    id: serialisation
    attributes:
      label: Model serialisation / loading
      description: How are models discovered, loaded, and exported? Any data-config interactions (shapes, dtypes)?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: RFC checklist
      options:
        - label: I've read `docs/contributor/architecture.md` and inspected `src/raitap/models/backend.py`.
        - label: I'll update `check_backend_compat` in every existing adapter family or document the rejections explicitly.
        - label: I'll add docs under `docs/modules/model/` and a contributor section under `docs/contributor/`.
