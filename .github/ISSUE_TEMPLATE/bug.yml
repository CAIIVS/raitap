name: Bug report
description: Something is wrong — crash, wrong output, broken Hydra composition, install failure.
title: "Fix ..."
labels: ["unsure"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: search existing issues

  - type: dropdown
    id: bug-kind
    attributes:
      label: Type(s)
      multiple: true
      options:
        - Runtime crash / traceback
        - Wrong / unexpected output
        - Hydra config composition failure (`_target_`, package_style, missing group)
        - Install / extras / `raitap-deps` issue
        - CLI / `raitap` entry-point issue
        - Reporting / tracking artefact issue
        - Visualiser rendering issue
        - Other
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module(s)
      multiple: true
      options:
        - transparency
        - robustness
        - metrics
        - reporting
        - tracking
        - data
        - model
        - pipeline
        - configs
        - deps
        - unsure
    validations:
      required: true

  - type: input
    id: raitap-version
    attributes:
      label: raitap version
      description: Output of `uv run raitap --version` (or commit SHA if running from source).
      placeholder: "e.g. 0.x.y  /  9a0e406"
    validations:
      required: true

  - type: input
    id: python-version
    description: Output of `python --version`
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - WSL
    validations:
      required: true

  - type: textarea
    id: install
    attributes:
      label: Install command
      description: How was raitap installed? (Extras matter — many bugs come from missing extras.)
      placeholder: "uv sync --extra captum --extra torch-intel"
      render: shell
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact invocation.
      placeholder: "uv run raitap +transparency=captum_ig data=mnist model=cnn"
      render: shell
    validations:
      required: true

  - type: textarea
    id: repro-config
    attributes:
      label: Minimal repro config
      description: YAML and/or Python that triggers the bug. Strip everything that isn't load-bearing.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback / output
      description: Full traceback or the unexpected output. For Hydra composition failures, paste the resolved config (`--cfg job`).
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false

  - type: textarea
    id: extra-context
    attributes:
      label: Extra context
      description: Recent changes, related issues, anything else.
    validations:
      required: false
