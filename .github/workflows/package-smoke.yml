name: Package smoke

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/raitap/**"
      - "uv.lock"
      - ".github/workflows/package-smoke.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload built dist
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: raitap-dist
          path: dist/
          retention-days: 1

  smoke-extras:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
        extra:
          - torch-cpu
          - onnx-cpu
          - shap
          - captum
          - torchattacks
          - foolbox
          - mlflow
          - metrics
          - reporting
          - launcher
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync with extra
        run: uv sync --extra ${{ matrix.extra }}
      - name: Import smoke
        run: uv run python -c "import raitap; print(raitap.__name__)"
