name: Package smoke

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/raitap/**"
      - "uv.lock"
      - ".github/workflows/package-smoke.yml"

jobs:
  build:
    # Single-version build: the produced wheel/sdist is identical regardless
    # of the interpreter that ran ``uv build``. We only validate metadata
    # once and only upload the 3.13 artifact to ``smoke-extras``.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload built dist
        uses: actions/upload-artifact@v7
        with:
          name: raitap-dist
          path: dist/
          retention-days: 1

  smoke-extras:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
        extra:
          - torch-cpu
          - onnx-cpu
          - shap
          - captum
          - torchattacks
          - foolbox
          - mlflow
          - metrics
          - reporting
          - launcher
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Download built dist
        uses: actions/download-artifact@v6
        with:
          name: raitap-dist
          path: dist/
      - name: Install built wheel with extra
        # Validates the actual published artifact instead of the source tree —
        # picks the wheel up from the ``build`` job's upload.
        run: |
          WHEEL=$(ls dist/raitap-*.whl | head -n1)
          uv venv --python ${{ matrix.python-version }}
          uv pip install "${WHEEL}[${{ matrix.extra }}]"
      - name: Import smoke
        run: uv run python -c "import raitap; print(raitap.__name__)"
