name: Package smoke

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/raitap/**"
      - "uv.lock"
      - ".github/workflows/package-smoke.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
