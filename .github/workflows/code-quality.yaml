name: Quality Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/code-quality.yaml"
      - ".github/actions/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  quality-gate-linux-cpu:
    name: Quality Gate (Linux CPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-raitap-env
        with:
          python-version: "3.13"
          sync-command: uv sync --group dev --extra torch-cpu --extra mlflow --extra shap --extra captum --extra metrics --extra onnx-cpu

      - name: Ruff
        run: uv run ruff check .

      - name: Ruff Format
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -m "not e2e" -v --cov=src/raitap --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  quality-gate-linux-cuda:
    name: Quality Gate (Linux CUDA)
    # Hosted GPU runners are not enabled for every repository by default.
    # Keep the job defined, but only run it when the repo explicitly opts in.
    if: ${{ vars.ENABLE_HOSTED_GPU_CI == 'true' }}
    runs-on: ubuntu-latest-gpu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-raitap-env
        with:
          python-version: "3.13"
          sync-command: uv sync --group dev --extra torch-cuda --extra mlflow --extra shap --extra captum --extra metrics --extra onnx-gpu

      - name: Ruff
        run: uv run ruff check .

      - name: Ruff Format
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -m "not e2e" -v
