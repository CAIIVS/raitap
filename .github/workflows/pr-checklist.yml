# Required status check for branch protection on `main`: workflow "PR checklist", job `require-checklist`.
# Parses the PR body and fails if any non-optional checkbox in `.github/pull_request_template.md` is unchecked.
name: PR checklist

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened]

jobs:
  require-checklist:
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: mheap/require-checklist-action@v2
        with:
          requireChecklist: true
          # Items tagged "(optional)" in pull_request_template.md are non-blocking.
          # (The action has no per-heading ignore; skipDescriptionRegex is the
          # supported mechanism — it skips checkboxes whose text matches.)
          skipDescriptionRegex: "\\(optional\\)"
          skipDescriptionRegexFlags: "i"
